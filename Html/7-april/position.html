        #section {

        }
        #div1 {
            position: absolute;
            /* top: 100px; */

        #div2 {
            position: relative;
            top: 10px;

        #div3 {
            position: fixed;
        }





        /* flex prop */

        /* demo for using flex shrink */
        #main{
            /* height: 80vh; */
            /* width: 30vw; the child divs will not overflow from its parent if parent's width is small they will arrange themselves  inside the parent container */
            /* background-color: rgb(12, 81, 58); */
            /* display: flex;  default flex direction is row */
            /* flex-direction: column;  */
            /* flex-wrap: wrap;  */
            /* justify-content: center; */
            /* align-items: center; */
            /* gap: 10px;  to forcefully provide spaces between the child elements */
        }

        /* demo for using flex grow */
        #main{
            height: 80vh;
            width: 90vw; /* the child divs will not overflow from its parent if parent's width is small they will arrange themselves  inside the parent container*/
            background-color: rgb(12, 81, 58);
            display: flex;  /* default flex direction is row*/
            /* flex-direction: column;  */
            /* flex-wrap: wrap;  */
            justify-content: center;
            align-items: center;
            gap: 10px;  /*to forcefully provide spaces between the child elements*/
        }

        .div{
            height: 100px;
            width: 200px;
            border: 1px solid red;
            background-color: rgb(72, 16, 16);
        }

        /* demo for flex shrink */
        /* .d1{
            flex-shrink: 1.5;
        } */

        /* demo for flex grow */
        .d1 {
            flex-grow: 0.5;
        }




        /* Grid prop */
        #grid {
            display: grid;
            /* grid-template-rows: repeat(1, 100px);
            grid-template-columns: repeat(6, 200px); */
            grid-template-rows: repeat(2, 100px);
            grid-template-columns: repeat(3, 200px);
            gap: 10px;

        }

        .child_grid {
            background-color: aqua;
            border: 1px solid black;
            text-align: center;
            /* width: 300px; */
        }

        .g1{
            grid-row: 1/3;
        }
        .g2{
            grid-column: 2/4;
        }


        
        /* Responsive nav with media queries */
        nav{
            display: flex;
            background-color: aqua  ;
            padding: 10px;
            justify-content: space-between;
        }

        @media (max-width: 400px) {
            nav{
                flex-direction: column;
                height: 150px;
            }
        }
    </style>
</head>
