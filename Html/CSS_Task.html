<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #jet > li{
            color: orange;
        }

        #lassi > li{
            color: green;
        }

        #biryani > .ing {
            color: orange;
        }

        #chicken + li {
            color: aqua;
        }

        #sugar > li {
            color: red;
        }

    </style>
</head>
<body>
    <h2>Ingredients for Biryani</h2>
    <ul id="biryani">
        <li class="ing">Rice</li>
        <li class="ing">Chicken</li>
        <ul id="chicken">
            <li>Fried</li>
            <li>Grilled</li>
            <li>Roasted</li>
        </ul>
        <li>Paneer</li>
    </ul>

    <h2>Fighter Jet</h2>
    <ul id="jet">
        <li>Spices</li>
        <li>Gas/Electric</li>
    </ul>

    <h2>Ingredients for Lassi</h2>
    <ul id="lassi">
        <li>Curd</li>
        <li>Water</li>
        <li>Sugar</li>
        <ul id="sugar">
            <li>White Sugar</li>
            <li>Brown Sugar</li>
        </ul>
        <li>Malai</li>
        <li>Kova</li>
    </ul>
</body>
</html>
